; ============================================================================
;  Dive WaterQuality Logger  —  PlatformIO project
;  Target: Seeed Studio XIAO ESP32-C6
;
;  NOTE: the OFFICIAL `platformio/espressif32` platform does NOT support the
;  Arduino framework on the ESP32-C6 (build fails with "this board doesn't
;  support arduino framework"). This project uses the community **pioarduino**
;  fork, which tracks the current Arduino-ESP32 3.x core and supports the C6.
; ============================================================================
[env:seeed_xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board    = seeed_xiao_esp32c6
framework = arduino

; --- flash layout: dual-slot OTA, no SPIFFS (this firmware logs to microSD) ---
; Locked in NOW because the unit is sealed: a future OTA must never require a
; partition change (that would mean a USB reflash you can't easily do).
board_build.partitions = partitions_ota.csv

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder      ; human-readable crash backtraces

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1               ; route Serial to the C6 native USB
                                               ; (if the monitor stays blank, flip to 0)

; Third-party libraries only. WiFi / WebServer / DNSServer / SD / SPI / Wire
; ship with the core. Adafruit BusIO is pulled in automatically.
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
    adafruit/Adafruit ADS1X15
    bblanchon/ArduinoJson @ ^7
    https://github.com/bluerobotics/BlueRobotics_MS5837_Library.git
